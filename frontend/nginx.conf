server {
    listen 80;

    # SPA fallback
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Marketing API — более специфичный prefix, должен стоять ДО /api
    location /api/marketing/ {
        proxy_pass         http://marketing-service:8002/v1/marketing/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Quarantine Animals API
    location /api/quarantine/ {
        proxy_pass         http://quarantine-service:8003/v1/quarantine/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Procurement API
    location /api/procurement/ {
        proxy_pass         http://procurement-service:8004/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legal API (legacy prefix /api → legal service)
    location /api/ {
        proxy_pass         http://legal-service:8001/v1/legal/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
